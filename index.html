    /* ============================================================

    /* ===== Theme: INK (dark, default) ===== */
    [data-theme="dark"]{
      --bg:#07090d;
      --bg-2:#0a0e14;
      --panel:#0c1118;
      --panel-2:#0f141d;
      --elev:#141a25;

      /* Borders — high-contrast, definitive */
      --rule:rgba(255,255,255,0.22);
      --rule-strong:rgba(255,255,255,0.38);
      --rule-soft:rgba(255,255,255,0.10);
      --rule-hair:rgba(255,255,255,0.05);

      /* Type */
      --text:rgba(255,255,255,0.96);
      --muted:rgba(255,255,255,0.62);
      --faint:rgba(255,255,255,0.40);

      /* Per-panel accents — saffron / sea-ink / vermilion */
      --accent-src:#e8b961;
      --accent-src-bg:rgba(232,185,97,0.08);
      --accent-src-line:rgba(232,185,97,0.42);
      --accent-src-glow:rgba(232,185,97,0.30);

      --accent-zh:#6dcfd9;
      --accent-zh-bg:rgba(109,207,217,0.07);
      --accent-zh-line:rgba(109,207,217,0.40);
      --accent-zh-glow:rgba(109,207,217,0.28);

      --accent-ja:#e87b6f;
      --accent-ja-bg:rgba(232,123,111,0.07);
      --accent-ja-line:rgba(232,123,111,0.42);
      --accent-ja-glow:rgba(232,123,111,0.30);

      --zhColor:rgba(196,232,237,0.96);
      --jaColor:rgba(245,212,206,0.96);

      /* Status */
      --danger:#f87171;
      --dangerBg:rgba(248,113,113,0.12);
      --dangerBd:rgba(248,113,113,0.36);
      --warning:#fbbf24;
      --warningBg:rgba(251,191,36,0.12);
      --warningBd:rgba(251,191,36,0.36);
      --success:#4ade80;
      --successBg:rgba(74,222,128,0.12);
      --blue:#60a5fa;
      --blueBg:rgba(96,165,250,0.12);
      --blueBd:rgba(96,165,250,0.40);

      --reverseBg:rgba(168,85,247,0.07);
      --reverseBd:rgba(168,85,247,0.32);
      --reverseText:rgba(228,216,248,0.92);

      --diffAdd:rgba(74,222,128,0.22);
      --diffDel:rgba(248,113,113,0.18);
      --diffDelText:rgba(255,255,255,0.36);

      --chipBg:rgba(255,255,255,0.03);
      --chipBd:rgba(255,255,255,0.16);
      --focus:rgba(255,255,255,0.30);

      --toastBg:rgba(15,18,24,0.96);
      --toastBd:rgba(255,255,255,0.20);
      --skelBar:rgba(255,255,255,0.06);

      --bodyBg:
        radial-gradient(1200px 800px at 8% -10%, rgba(232,185,97,0.05), transparent 55%),
        radial-gradient(900px 700px at 105% 110%, rgba(109,207,217,0.04), transparent 50%),
        radial-gradient(800px 600px at 50% 50%, rgba(232,123,111,0.025), transparent 60%),
        var(--bg);
      --grain-opacity:0.5;
    }

    /* ===== Theme: VELLUM (light, warm cream) ===== */
    [data-theme="light"]{
      --bg:#ece4d2;
      --bg-2:#f1ead9;
      --panel:#f9f3e3;
      --panel-2:#f5efde;
      --elev:#fffdf6;

      --rule:rgba(40,30,20,0.28);
      --rule-strong:rgba(40,30,20,0.50);
      --rule-soft:rgba(40,30,20,0.12);
      --rule-hair:rgba(40,30,20,0.05);

      --text:rgba(28,22,14,0.92);
      --muted:rgba(28,22,14,0.58);
      --faint:rgba(28,22,14,0.36);

      --accent-src:#a86d18;
      --accent-src-bg:rgba(168,109,24,0.08);
      --accent-src-line:rgba(168,109,24,0.50);
      --accent-src-glow:rgba(168,109,24,0.20);

      --accent-zh:#176870;
      --accent-zh-bg:rgba(23,104,112,0.07);
      --accent-zh-line:rgba(23,104,112,0.45);
      --accent-zh-glow:rgba(23,104,112,0.18);

      --accent-ja:#8a2620;
      --accent-ja-bg:rgba(138,38,32,0.07);
      --accent-ja-line:rgba(138,38,32,0.48);
      --accent-ja-glow:rgba(138,38,32,0.20);

      --zhColor:rgba(20,75,82,0.94);
      --jaColor:rgba(110,30,25,0.94);

      --danger:#b91c1c;
      --dangerBg:rgba(185,28,28,0.08);
      --dangerBd:rgba(185,28,28,0.30);
      --warning:#92400e;
      --warningBg:rgba(217,119,6,0.10);
      --warningBd:rgba(180,83,9,0.32);
      --success:#15803d;
      --successBg:rgba(21,128,61,0.10);
      --blue:#1d4ed8;
      --blueBg:rgba(29,78,216,0.07);
      --blueBd:rgba(29,78,216,0.34);

      --reverseBg:rgba(91,33,182,0.05);
      --reverseBd:rgba(91,33,182,0.30);
      --reverseText:rgba(59,27,112,0.88);

      --diffAdd:rgba(21,128,61,0.18);
      --diffDel:rgba(185,28,28,0.14);
      --diffDelText:rgba(28,22,14,0.36);

      --chipBg:rgba(28,22,14,0.04);
      --chipBd:rgba(28,22,14,0.18);
      --focus:rgba(28,22,14,0.34);

      --toastBg:rgba(255,253,247,0.98);
      --toastBd:rgba(28,22,14,0.22);
      --skelBar:rgba(28,22,14,0.07);

      --bodyBg:
        radial-gradient(1200px 800px at 8% -10%, rgba(168,109,24,0.08), transparent 55%),
        radial-gradient(900px 700px at 105% 110%, rgba(23,104,112,0.05), transparent 50%),
        radial-gradient(800px 600px at 50% 50%, rgba(138,38,32,0.03), transparent 60%),
        var(--bg);
      --grain-opacity:0.35;
    }

    :root{
      --split:0.5;
      --dividerW:14px;
      --radius:7px;
      --radius-lg:10px;

      --font-display:'Fraunces','Noto Serif TC','Noto Serif JP',Georgia,serif;
      --font-body:'Inter','Noto Serif TC','Noto Serif JP',system-ui,-apple-system,Segoe UI,sans-serif;
      --font-serif:'Noto Serif TC','Noto Serif JP','Fraunces',Georgia,serif;
      --font-mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Consolas,monospace;
      --reading-mail:24px;
      --reading-mail-m:20px;
      --reading-interp:32px;
      --reading-interp-m:30px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      background:var(--bodyBg);
      color:var(--text);
      font-family:var(--font-body);
      font-feature-settings:'kern','ss01','cv11';
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
      overflow:hidden;
    }

    /* Atmospheric paper-grain */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(circle at 22% 30%, var(--rule-hair) 0.5px, transparent 1.5px),
        radial-gradient(circle at 78% 65%, var(--rule-hair) 0.5px, transparent 1.5px),
        radial-gradient(circle at 50% 90%, var(--rule-hair) 0.5px, transparent 1.5px);
      background-size:90px 90px,140px 140px,180px 180px;
      background-position:0 0,45px 45px,20px 70px;
      opacity:var(--grain-opacity);
      z-index:0;
    }

    .wrap{
      position:relative;
      width:100%;
      max-width:1920px;
      margin:0 auto;
      padding:18px 24px 16px;
      height:100vh;
      display:flex;
      flex-direction:column;
      z-index:2;
      transition:width 220ms ease, max-width 220ms ease, transform 220ms ease;
    }

    /* ============================================================
       MASTHEAD — Editorial top-bar
       ============================================================ */
    .toprow{
      display:flex;
      align-items:flex-end;
      gap:10px;
      padding:0 0 14px 0;
      margin-bottom:14px;
      border-bottom:1.5px solid var(--rule);
      position:relative;
    }
    .toprow::after{
      content:"";
      position:absolute;
      left:0; right:0; bottom:-4.5px;
      height:1px;
      background:var(--rule-soft);
    }

    .masthead{
      display:flex;
      align-items:baseline;
      gap:14px;
      margin-right:auto;
      flex-wrap:wrap;
    }
    .masthead .wordmark{
      font-family:var(--font-display);
      font-weight:600;
      font-size:26px;
      letter-spacing:-0.01em;
      color:var(--text);
      font-variation-settings:'opsz' 144,'SOFT' 50;
      line-height:1;
      font-style:italic;
    }
    .masthead .subtitle{
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.30em;
      text-transform:uppercase;
      color:var(--faint);
      padding-bottom:3px;
    }
    .masthead .langs{
      display:inline-flex;
      align-items:center;
      gap:0;
      font-family:var(--font-mono);
      font-size:11px;
      letter-spacing:0.18em;
      padding-bottom:3px;
      font-weight:600;
    }
    .masthead .langs .l-zh{ color:var(--accent-zh); }
    .masthead .langs .l-ja{ color:var(--accent-ja); }
    .masthead .langs .sep{
      color:var(--faint);
      padding:0 7px;
      font-weight:400;
    }

    /* ============================================================
       BUTTONS
       ============================================================ */
    .icon{
      font-family:var(--font-body);
      font-size:11px;
      font-weight:500;
      letter-spacing:0.01em;
      border:1px solid transparent;
      background:transparent;
      color:var(--muted);
      border-radius:var(--radius);
      padding:5px 8px;
      line-height:1;
      cursor:pointer;
      transition:color 140ms ease,background 140ms ease,border-color 140ms ease,transform 100ms ease;
      white-space:nowrap;
    }
    .icon:hover{
      color:var(--text);
      background:var(--rule-soft);
      border-color:var(--rule-soft);
    }
    .icon:active{ transform:translateY(1px); }
    .icon:disabled{
      opacity:0.32;
      cursor:not-allowed;
      pointer-events:none;
    }
    .icon.primary{
      color:var(--text);
      background:var(--rule-soft);
      border-color:var(--rule);
    }
    .icon.primary:hover{
      background:var(--rule);
      border-color:var(--rule-strong);
    }

    /* ============================================================
       PRIMARY ACTION KEY — #btnTranslate
       Saffron letterpress key anchored to the source-panel accent.
       Mail = deliberate (calm key). Interp = immediate (glow ring).
       Presentation only; text/behaviour unchanged.
       ============================================================ */
    /* Box-shadow keeps a UNIFORM 4-layer structure across every state
       (sheen · ring · cast · hairline). The ring layer is transparent in
       mail mode and coloured in interp mode, so the mode transition
       interpolates layer-by-layer and settles cleanly (mismatched layer
       counts otherwise leave a stuck ring after the morph). */
    #btnTranslate{
      appearance:none;
      -webkit-appearance:none;
      font-family:var(--font-body);
      font-size:12px;
      font-weight:700;
      letter-spacing:0.06em;
      line-height:1;
      white-space:nowrap;
      padding:7px 16px;
      border-radius:var(--radius);
      border:1.5px solid var(--accent-src);
      color:var(--key-ink,#17110a);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.32), rgba(255,255,255,0) 46%),
        linear-gradient(180deg, rgba(0,0,0,0) 58%, rgba(0,0,0,0.16)),
        var(--accent-src);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.5) inset,
        0 0 0 3px transparent,
        0 6px 16px var(--accent-src-glow),
        0 1px 2px rgba(0,0,0,0.28);
      cursor:pointer;
      /* filter is intentionally NOT transitioned: hover/active/disabled use
         different filter function lists (brightness/saturate vs grayscale),
         which interpolate poorly — apply them instantly instead. */
      transition:transform 120ms cubic-bezier(0.2,0.8,0.2,1), box-shadow 180ms ease;
    }
    /* Light (Vellum) theme: the shared saffron accent (#a86d18) is too light
       for cream ink to clear WCAG AA, so the key uses a deeper amber of the
       same hue — cohesive with the theme, ~5.5:1 contrast on the label. */
    [data-theme="light"] #btnTranslate{
      --key-ink:#fdf4df;
      border-color:#6f460d;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.22), rgba(255,255,255,0) 46%),
        linear-gradient(180deg, rgba(0,0,0,0) 55%, rgba(0,0,0,0.18)),
        #875510;
    }
    #btnTranslate:hover{
      transform:translateY(-1px);
      filter:brightness(1.05) saturate(1.04);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.55) inset,
        0 0 0 3px transparent,
        0 10px 24px var(--accent-src-glow),
        0 1px 2px rgba(0,0,0,0.28);
    }
    #btnTranslate:active{
      transform:translateY(1px);
      filter:brightness(0.98);
      box-shadow:
        0 2px 5px rgba(0,0,0,0.32) inset,
        0 0 0 3px transparent,
        0 2px 6px var(--accent-src-glow),
        0 1px 2px rgba(0,0,0,0.28);
    }
    #btnTranslate:focus-visible{
      outline:2px solid var(--accent-src);
      outline-offset:3px;
    }
    #btnTranslate:disabled{
      opacity:0.42;
      filter:grayscale(0.4);
      box-shadow:
        0 0 0 3px transparent,
        0 1px 2px rgba(0,0,0,0.12);
      transform:none;
      cursor:not-allowed;
    }
    /* Interp mode: live/immediate — ring layer lit + brighter presence */
    body[data-mode="interp"] #btnTranslate{
      letter-spacing:0.08em;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.55) inset,
        0 0 0 3px var(--accent-src-glow),
        0 8px 20px var(--accent-src-glow),
        0 1px 2px rgba(0,0,0,0.28);
    }
    body[data-mode="interp"] #btnTranslate:hover{
      box-shadow:
        0 1px 0 rgba(255,255,255,0.6) inset,
        0 0 0 4px var(--accent-src-glow),
        0 12px 26px var(--accent-src-glow),
        0 1px 2px rgba(0,0,0,0.28);
    }
    @media (prefers-reduced-motion: reduce){
      #btnTranslate{ transition:none; }
      #btnTranslate:hover, #btnTranslate:active{ transform:none; }
    }
    #btnTheme{
      min-width:34px;
      font-size:17px;
      font-weight:600;
      line-height:1;
      padding:4px 8px 6px;
    }

    .icon.copied{
      color:var(--success) !important;
      background:var(--successBg) !important;
      border-color:var(--success) !important;
    }
    .icon.hide-action{
      color:var(--danger);
      font-weight:700;
      min-width:28px;
    }
    .icon.hide-action:hover{
      color:var(--danger);
      background:var(--dangerBg);
      border-color:var(--dangerBd);
    }
    .icon.chat-close-action{
      color:var(--danger);
      font-weight:700;
      min-width:28px;
    }
    .icon.chat-close-action:hover{
      color:var(--danger);
      background:var(--dangerBg);
      border-color:var(--dangerBd);
    }
    .icon.refining{ animation:spin-refine 0.9s linear infinite; }
    @keyframes spin-refine{ to{ transform:rotate(360deg); } }

    .preedit-wrap{
      position:relative;
      display:inline-flex;
    }
    .preedit-menu{
      position:absolute;
      top:calc(100% + 6px);
      right:0;
      min-width:228px;
      padding:6px;
      border:1px solid var(--rule);
      border-radius:var(--radius);
      background:var(--panel);
      box-shadow:0 14px 34px rgba(0,0,0,0.34);
      z-index:40;
      display:none;
    }
    .preedit-menu.show{ display:block; }
    .preedit-section{
      padding:5px 7px 4px;
      color:var(--faint);
      font-family:var(--font-mono);
      font-size:9px;
      letter-spacing:0.16em;
      text-transform:uppercase;
    }
    .preedit-item{
      display:block;
      width:100%;
      border:0;
      border-radius:5px;
      background:transparent;
      color:var(--muted);
      padding:8px 9px;
      text-align:left;
      font-family:var(--font-body);
      font-size:12px;
      line-height:1.25;
      cursor:pointer;
    }
    .preedit-item-title{
      display:block;
      color:var(--text);
      font-weight:600;
    }
    .preedit-item-desc{
      display:block;
      margin-top:2px;
      color:var(--faint);
      font-size:10.5px;
      line-height:1.35;
    }
    .preedit-item:hover{
      color:var(--text);
      background:var(--rule-soft);
    }
    #srcPanel.preediting::before{
      box-shadow:
        0 0 12px var(--accent-src),
        0 0 30px var(--accent-src-glow);
    }
    #srcPanel.preediting textarea{
      opacity:0.72;
    }

    /* Source language override dropdown */
    .lang-select{
      font-family:var(--font-mono);
      background:transparent;
      border:1px solid var(--rule);
      border-radius:var(--radius);
      color:var(--muted);
      font-size:10.5px;
      font-weight:600;
      letter-spacing:0.20em;
      text-transform:uppercase;
      padding:6px 10px;
      cursor:pointer;
      outline:none;
      transition:color 140ms ease,border-color 140ms ease,background 140ms ease;
    }
    .lang-select:hover,.lang-select:focus{
      color:var(--text);
      border-color:var(--rule-strong);
      background:var(--rule-soft);
    }
    .lang-select option,
    .modal select option{
      color:#111827;
      background:#ffffff;
    }
    .lang-select option:checked,
    .modal select option:checked{
      color:#ffffff;
      background:#3f6dcc;
    }

    /* ============================================================
       PANEL — Bold borders + accent stripe
       ============================================================ */
    .grid{
      display:flex;
      flex-direction:row;
      gap:0;
      flex:1 1 0;
      min-height:0;
      min-width:0;
      overflow:hidden;
    }

    .panel{
      position:relative;
      border:1.5px solid var(--rule);
      background:var(--panel);
      border-radius:var(--radius);
      overflow:hidden;
      display:flex;
      flex-direction:column;
      min-height:0;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.04) inset,
        0 18px 50px rgba(0,0,0,0.18);
      transition:border-color 220ms ease,box-shadow 220ms ease;
    }
    [data-theme="light"] .panel{
      box-shadow:
        0 1px 0 rgba(255,255,255,0.6) inset,
        0 14px 30px rgba(60,40,15,0.10),
        0 2px 6px rgba(60,40,15,0.06);
    }

    /* Left accent stripe — THE primary visual identifier */
    .panel::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width:5px;
      background:var(--panel-accent, var(--rule));
      z-index:3;
      transition:box-shadow 200ms ease,opacity 200ms ease;
    }

    /* Top-right corner bracket — editorial mark */
    .panel::after{
      content:"";
      position:absolute;
      top:8px;
      right:8px;
      width:14px;
      height:14px;
      border-top:1.5px solid var(--panel-accent, var(--rule));
      border-right:1.5px solid var(--panel-accent, var(--rule));
      opacity:0.50;
      pointer-events:none;
      z-index:3;
    }

    /* Per-panel accent assignment */
    #srcPanel{ --panel-accent:var(--accent-src); --panel-tint:var(--accent-src-bg); --panel-line:var(--accent-src-line); --panel-glow:var(--accent-src-glow); flex:0.42 1 0; min-width:0; }
    #t1Panel[data-target-lang="zh-TW"]{ --panel-accent:var(--accent-zh); --panel-tint:var(--accent-zh-bg); --panel-line:var(--accent-zh-line); --panel-glow:var(--accent-zh-glow); container-type:inline-size; }
    #t1Panel[data-target-lang="ja"]{ --panel-accent:var(--accent-ja); --panel-tint:var(--accent-ja-bg); --panel-line:var(--accent-ja-line); --panel-glow:var(--accent-ja-glow); container-type:inline-size; }

    .panel:hover{
      border-color:var(--panel-line);
    }
    .panel:focus-within{
      border-color:var(--panel-accent);
    }

    /* ============================================================
       PANEL HEADER (.bar)
       ============================================================ */
    .bar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:6px 12px 6px 14px;
      border-bottom:1px solid var(--rule-soft);
      background:linear-gradient(180deg,
        var(--panel-tint, transparent) 0%,
        transparent 90%);
      flex-shrink:0;
      flex-wrap:wrap;
    }

    .panel-id{
      display:flex;
      align-items:baseline;
      gap:12px;
      flex-wrap:wrap;
    }

    .panel-mark{
      font-family:var(--font-display);
      font-weight:600;
      font-size:20px;
      color:var(--panel-accent);
      line-height:0.9;
      letter-spacing:-0.02em;
      font-variation-settings:'opsz' 144,'SOFT' 100;
      font-style:italic;
      display:inline-block;
      min-width:18px;
      text-align:center;
    }

    .chip{
      display:inline-flex;
      align-items:baseline;
      gap:0;
      padding:0;
      background:transparent;
      border:none;
      color:var(--muted);
      font-family:var(--font-mono);
      font-weight:600;
      letter-spacing:0;
    }
    .chip .role{
      color:var(--muted);
      font-size:10px;
      letter-spacing:0.26em;
      text-transform:uppercase;
      padding-right:8px;
    }
    .chip .sep{
      display:inline-block;
      width:1px;
      height:10px;
      background:var(--rule);
      margin:0 8px 0 0;
      transform:translateY(1px);
    }
    .chip .lang{
      color:var(--panel-accent);
      font-size:12px;
      letter-spacing:0.14em;
      font-weight:700;
    }

    .count{
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.10em;
      color:var(--faint);
      font-variant-numeric:tabular-nums;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:2px;
      flex-wrap:nowrap;
    }

    /* ============================================================
       TEXTAREA / OUTPUT
       ============================================================ */
    textarea{
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      padding:14px 22px 18px 22px;
      resize:none;
      outline:none;
      font-family:var(--font-serif);
      font-size:var(--reading-mail);
      line-height:1.65;
      letter-spacing:0.005em;
      flex:1;
      min-height:0;
      overflow:auto;
      font-feature-settings:'kern','liga';
    }

    textarea::placeholder{
      color:var(--faint);
      opacity:0.55;
      font-style:italic;
      font-family:var(--font-display);
      font-variation-settings:'opsz' 96,'SOFT' 80;
    }

    .output-text{
      margin:0;
      width:100%;
      border:0;
      background:transparent;
      color:var(--text);
      padding:14px 22px 18px 22px;
      font-family:var(--font-serif);
      font-size:var(--reading-mail);
      line-height:1.65;
      letter-spacing:0.005em;
      flex:1;
      min-height:0;
      overflow:auto;
      white-space:pre-wrap;
      word-break:break-word;
      outline:none;
      cursor:text;
      font-feature-settings:'kern','liga';
    }
    .output-text:focus{
      box-shadow:inset 0 0 0 1.5px var(--panel-accent);
      border-radius:3px;
    }
    .output-text:empty::before{
      content:attr(data-placeholder);
      color:var(--faint);
      opacity:0.65;
      font-style:italic;
      font-family:var(--font-display);
      font-variation-settings:'opsz' 96,'SOFT' 100;
      pointer-events:none;
    }

    #t1Panel[data-target-lang="zh-TW"] #out1{ color:var(--zhColor); }
    #t1Panel[data-target-lang="ja"] #out1{ color:var(--jaColor); }

    /* ============================================================
       DIVIDERS — visible grip + hover indicator
       ============================================================ */
    .grid-divider{
      width:var(--dividerW);
      cursor:col-resize;
      position:relative;
      flex:0 0 var(--dividerW);
      touch-action:none;
    }
    .grid-divider::before{
      content:"";
      position:absolute;
      top:14%;
      bottom:14%;
      left:50%;
      width:2px;
      transform:translateX(-50%);
      background:
        linear-gradient(180deg,transparent,var(--rule) 30%,var(--rule) 70%,transparent);
      opacity:0.65;
      transition:opacity 160ms ease,width 160ms ease;
    }
    .grid-divider::after{
      content:"↔";
      position:absolute;
      left:50%; top:50%;
      transform:translate(-50%,-50%);
      font-family:var(--font-mono);
      font-size:11px;
      color:var(--muted);
      background:var(--bg);
      padding:6px 0;
      letter-spacing:0;
      opacity:0;
      transition:opacity 160ms ease;
    }
    .grid-divider:hover::before{ opacity:1; width:3px; }
    .grid-divider:hover::after{ opacity:0.8; }

    .outs{
      display:flex;
      flex-direction:column;
      gap:0;
      align-items:stretch;
      flex:0.58 1 0;
      min-height:0;
      min-width:0;
    }

    /* ============================================================
       PANEL BODY (for reverse translation side-by-side)
       ============================================================ */
    .panel-body{
      display:flex;
      min-height:0;
      flex:1;
    }
    .panel-body>.output-text{
      flex:1;
      min-width:0;
    }

    .reverse-col{
      flex:1;
      min-width:0;
      border-left:1.5px solid var(--reverseBd);
      background:var(--reverseBg);
      display:flex;
      flex-direction:column;
    }
    .reverse-header{
      display:flex;
      align-items:center;
      gap:6px;
      padding:8px 12px 7px;
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.16em;
      text-transform:uppercase;
      color:var(--muted);
      border-bottom:1px solid var(--reverseBd);
      background:linear-gradient(180deg,rgba(168,85,247,0.06),transparent);
    }
    .reverse-header .chip{
      font-size:10px;
      letter-spacing:0.14em;
    }
    .reverse-text{
      color:var(--reverseText) !important;
      flex:1;
    }

    @container (max-width: 700px){
      .panel-body{ flex-direction:column; }
      .reverse-col{
        border-left:none;
        border-top:1.5px solid var(--reverseBd);
      }
    }

    /* ============================================================
       SETTINGS OVERLAY / MODAL
       ============================================================ */
    .overlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:flex-start;
      justify-content:center;
      padding:60px 20px 20px;
      background:rgba(0,0,0,0.62);
      backdrop-filter:blur(14px) saturate(140%);
      -webkit-backdrop-filter:blur(14px) saturate(140%);
      z-index:50;
    }
    .overlay.show{ display:flex; }
    [data-theme="light"] .overlay{ background:rgba(40,30,20,0.40); }

    .modal{
      width:min(560px,100%);
      border-radius:var(--radius);
      background:var(--toastBg);
      border:1.5px solid var(--rule-strong);
      box-shadow:
        0 30px 80px rgba(0,0,0,0.55),
        0 1px 0 rgba(255,255,255,0.05) inset;
      padding:22px 24px 18px;
      animation:modal-in 280ms cubic-bezier(0.2,0.8,0.2,1);
      position:relative;
    }
    .modal::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width:4px;
      background:var(--accent-src);
      border-radius:var(--radius) 0 0 var(--radius);
    }
    @keyframes modal-in{
      from{ opacity:0; transform:translateY(-12px) scale(0.99); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }

    .modalHead{
      display:flex;
      align-items:baseline;
      justify-content:space-between;
      gap:10px;
      padding:0 0 14px 0;
      margin-bottom:4px;
      border-bottom:1px solid var(--rule-soft);
    }
    .modalHead .modal-title{
      font-family:var(--font-display);
      font-weight:600;
      font-size:22px;
      letter-spacing:-0.01em;
      color:var(--text);
      font-variation-settings:'opsz' 144,'SOFT' 50;
      font-style:italic;
      line-height:1;
    }
    .modalHead .modal-tag{
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.30em;
      text-transform:uppercase;
      color:var(--faint);
    }

    .field{
      display:grid;
      gap:8px;
      margin-top:14px;
      padding:12px 12px 10px;
      border-radius:var(--radius);
      border:1px solid var(--rule-soft);
      background:var(--panel-2);
    }
    .field label{
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.20em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:600;
    }

    .in,.modal select{
      width:100%;
      border-radius:var(--radius);
      border:1px solid var(--rule);
      background:var(--bg);
      color:var(--text);
      padding:10px 12px;
      outline:none;
      font-size:13px;
      font-family:var(--font-body);
      transition:border-color 140ms ease,box-shadow 140ms ease;
    }
    .in:focus,.modal select:focus{
      border-color:var(--accent-src);
      box-shadow:0 0 0 3px var(--accent-src-bg);
    }

    .tog{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:4px 0;
    }
    .tog span{
      font-size:13px;
      color:var(--text);
      font-weight:500;
    }
    .tog input[type="checkbox"]{
      accent-color:var(--accent-src);
      width:16px;
      height:16px;
      cursor:pointer;
    }

    .hint{
      font-family:var(--font-mono);
      font-size:10px;
      color:var(--faint);
      letter-spacing:0.04em;
      padding:4px 0 0;
      line-height:1.55;
    }
    .api-key-help{
      display:inline-flex;
      align-items:center;
      gap:6px;
      width:max-content;
      max-width:100%;
      color:var(--accent-src);
      text-decoration:none;
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.04em;
      line-height:1.5;
    }
    .api-key-help:hover{
      color:var(--text);
      text-decoration:underline;
      text-underline-offset:3px;
    }
    .api-key-banner{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      margin:0 0 14px;
      padding:13px 14px;
      border:1.5px solid var(--accent-src-line);
      border-radius:var(--radius);
      background:linear-gradient(135deg,var(--accent-src-bg),var(--panel-2));
      box-shadow:0 16px 38px rgba(0,0,0,0.18), inset 4px 0 0 var(--accent-src);
    }
    .api-key-banner[hidden]{ display:none; }
    .api-key-banner strong{
      display:block;
      margin-bottom:3px;
      font-size:14px;
      line-height:1.35;
      color:var(--text);
      font-weight:700;
    }
    .api-key-banner span{
      display:block;
      color:var(--muted);
      font-size:12px;
      line-height:1.45;
    }
    .api-key-banner .icon{
      flex:0 0 auto;
      border-color:var(--accent-src-line);
      color:var(--text);
      background:var(--accent-src-bg);
      padding:8px 10px;
    }

    /* ============================================================
       TTS — speaking states
       ============================================================ */
    .icon.speaking{
      color:var(--danger) !important;
      background:var(--dangerBg) !important;
      border-color:var(--dangerBd) !important;
    }

    .panel.speaking-glow::before{
      box-shadow:
        0 0 12px var(--panel-accent),
        0 0 30px var(--panel-glow);
      animation:stripe-pulse 1.6s ease-in-out infinite;
    }
    @keyframes stripe-pulse{
      0%,100%{ opacity:1; }
      50%{ opacity:0.55; }
    }

    .stop-fab{
      position:fixed;
      bottom:24px;
      right:24px;
      background:var(--danger);
      color:#fff;
      border:none;
      border-radius:var(--radius);
      padding:12px 22px;
      font-weight:600;
      font-size:12.5px;
      font-family:var(--font-body);
      letter-spacing:0.04em;
      cursor:pointer;
      box-shadow:
        0 8px 28px rgba(248,113,113,0.45),
        0 1px 0 rgba(255,255,255,0.10) inset;
      transform:scale(0);
      transition:transform 220ms cubic-bezier(0.2,0.8,0.2,1);
      z-index:150;
    }
    .stop-fab.show{ transform:scale(1); }
    .stop-fab:hover{ filter:brightness(1.08); }

    /* ============================================================
       TOAST
       ============================================================ */
    #toastHost{
      position:fixed;
      bottom:20px;
      right:20px;
      z-index:9999;
      display:flex;
      flex-direction:column;
      gap:8px;
      align-items:flex-end;
      pointer-events:none;
      max-width:400px;
    }
    .toast-item{
      background:var(--toastBg);
      color:var(--text);
      border:1.5px solid var(--rule);
      border-radius:var(--radius);
      padding:10px 16px;
      font-size:12.5px;
      font-family:var(--font-body);
      line-height:1.5;
      white-space:pre-line;
      box-shadow:0 12px 30px rgba(0,0,0,0.40);
      opacity:0;
      transform:translateY(8px);
      transition:opacity 160ms ease,transform 160ms ease;
      pointer-events:auto;
      cursor:pointer;
      backdrop-filter:blur(8px);
    }
    .toast-item.show{ opacity:1; transform:translateY(0); }
    .toast-item.out{ opacity:0; transform:translateY(8px); transition-duration:200ms; }
    .toast-item.toast-error{
      border-color:var(--dangerBd);
      background:var(--dangerBg);
      color:var(--danger);
    }
    .toast-item.toast-undo{
      border-color:var(--blueBd);
      background:var(--blueBg);
    }
    .toast-item .undo-link{
      color:var(--blue);
      font-weight:600;
      text-decoration:underline;
      cursor:pointer;
      margin-left:6px;
    }

    /* ============================================================
       SKELETON LOADING
       ============================================================ */
    @keyframes skeleton-pulse{
      0%,100%{ opacity:0.32; }
      50%{ opacity:0.7; }
    }
    .panel.loading .output-text::before{
      content:"";
      display:block;
      height:100%;
      background:
        linear-gradient(var(--skelBar) 16px,transparent 16px) 0 0  / 85% 32px,
        linear-gradient(var(--skelBar) 16px,transparent 16px) 0 32px / 70% 32px,
        linear-gradient(var(--skelBar) 16px,transparent 16px) 0 64px / 90% 32px,
        linear-gradient(var(--skelBar) 16px,transparent 16px) 0 96px / 60% 32px;
      background-repeat:no-repeat;
      animation:skeleton-pulse 1.5s ease-in-out infinite;
      border-radius:2px;
      font-style:normal;
      opacity:1;
    }

    /* Loading panel: stripe pulses with accent color */
    .panel.loading::before{
      animation:stripe-load 1.4s ease-in-out infinite;
    }
    @keyframes stripe-load{
      0%,100%{ opacity:1; box-shadow:0 0 8px var(--panel-glow); }
      50%{ opacity:0.5; box-shadow:0 0 22px var(--panel-glow); }
    }

    /* ============================================================
       DIFF
       ============================================================ */
    .diff-add{
      background:var(--diffAdd);
      border-radius:2px;
      padding:1px 2px;
      font-weight:500;
    }
    .diff-del{
      background:var(--diffDel);
      text-decoration:line-through;
      color:var(--diffDelText);
      border-radius:2px;
      padding:1px 2px;
    }
    .icon.diff-active{
      color:var(--blue) !important;
      background:var(--blueBg) !important;
      border-color:var(--blue) !important;
    }

    /* ============================================================
       ACCESSIBILITY / RESPONSIVE
       ============================================================ */
    @media (prefers-reduced-motion: reduce){
      .toast-item,.toast-item.show,.toast-item.out{ transform:none; }
      .panel.loading .output-text::before{ animation:none; opacity:0.5; }
      .icon.refining{ animation:none; }
      .panel.loading::before{ animation:none; opacity:0.6; }
      .panel.speaking-glow::before{ animation:none; }
      *{ transition-duration:0.01ms !important; animation-duration:0.01ms !important; }
    }

    @media (max-width: 980px){
      .wrap{ padding:14px 16px 12px; }
      .toprow{ flex-wrap:wrap; gap:8px; }
      .api-key-banner{ align-items:flex-start; flex-direction:column; }
      .masthead .subtitle{ display:none; }
      .masthead .wordmark{ font-size:22px; }
    }

    @media (max-width: 900px){
      .grid{ flex-direction:column; }
      .grid-divider{
        width:auto;
        height:var(--dividerW);
        flex:0 0 var(--dividerW);
        cursor:row-resize;
      }
      .grid-divider::before{
        left:14%;
        right:14%;
        top:50%;
        bottom:auto;
        width:auto;
        height:2px;
        transform:translateY(-50%);
        background:linear-gradient(90deg,transparent,var(--rule) 30%,var(--rule) 70%,transparent);
      }
      .grid-divider::after{
        content:"⟷";
        padding:0 10px;
      }
      .grid-divider:hover::before{ height:3px; width:auto; }
    }

    @media (max-width: 720px){
      textarea,.output-text{ font-size:var(--reading-mail-m); padding:12px 16px 14px 16px; }
      .bar{ padding:6px 10px 6px 12px; }
      .panel::before{ width:4px; }
      #toastHost{
        right:50%;
        transform:translateX(50%);
        align-items:center;
        max-width:92vw;
      }
      .panel-body{ flex-direction:column; }
      .reverse-col{
        border-left:none;
        border-top:1.5px solid var(--reverseBd);
      }
      .panel-mark{ font-size:20px; }
    }

    /* ============================================================
       v2: GLOSSARY MODAL — restored
       ============================================================ */
    :root{ --chatW:380px; }
    .modal-wide{
      width:min(720px,100%);
    }
    .glossary-actions{
      display:flex;
      gap:6px;
      margin-top:14px;
      flex-wrap:wrap;
    }
    .glossary-add-row{
      display:grid;
      grid-template-columns:1fr auto 1fr auto;
      gap:8px;
      align-items:center;
      margin-top:14px;
      padding:10px 12px;
      border-radius:var(--radius);
      border:1px solid var(--rule-soft);
      background:var(--panel-2);
    }
    .glossary-arrow{
      color:var(--faint);
      font-family:var(--font-mono);
      text-align:center;
      font-size:14px;
    }
    .glossary-suggestions{
      margin-top:14px;
      padding:10px 12px;
      border-radius:var(--radius);
      border:1px solid var(--accent-src-line);
      background:var(--accent-src-bg);
      max-height:240px;
      overflow-y:auto;
    }
    .glossary-section-label{
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.20em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:600;
      margin-bottom:8px;
      display:flex;
      align-items:center;
      justify-content:space-between;
    }
    .suggestion-item{
      display:grid;
      grid-template-columns:1fr 1fr auto;
      gap:8px;
      align-items:center;
      padding:6px 0;
      border-bottom:1px solid var(--rule-soft);
    }
    .suggestion-item:last-child{ border-bottom:none; }
    .suggestion-text{
      font-size:13px;
      color:var(--text);
      font-family:var(--font-serif);
      word-break:break-word;
    }
    .glossary-table-wrap{
      margin-top:14px;
      max-height:340px;
      overflow-y:auto;
      border:1px solid var(--rule-soft);
      border-radius:var(--radius);
    }
    .glossary-table{
      width:100%;
      border-collapse:collapse;
    }
    .glossary-table th,.glossary-table td{
      padding:8px 12px;
      text-align:left;
      border-bottom:1px solid var(--rule-soft);
      font-size:13px;
      color:var(--text);
    }
    .glossary-table th{
      font-family:var(--font-mono);
      font-size:10px;
      letter-spacing:0.18em;
      text-transform:uppercase;
      color:var(--muted);
      font-weight:600;
      background:var(--panel-2);
      position:sticky;
      top:0;
      z-index:1;
    }
    .glossary-table tr:last-child td{ border-bottom:none; }
    .glossary-table td input.in{
      width:100%;
      background:transparent;
      border:1px solid transparent;
      padding:6px 8px;
      border-radius:4px;
      font-family:var(--font-serif);
    }
    .glossary-table td input.in:focus{
      border-color:var(--rule);
      background:var(--panel-2);
    }
    .glossary-table td:last-child{
      text-align:right;
      width:60px;
    }
    .glossary-empty{
      text-align:center;
      padding:28px 12px;
      color:var(--faint);
      font-style:italic;
      font-family:var(--font-display);
    }

    /* ============================================================
       v2: CHAT SIDEBAR — restored
       ============================================================ */
    body.chat-open .wrap{
      width:calc(100% - var(--chatW));
      max-width:none;
      margin:0;
      transform:none;
    }
    .chat-sidebar{
      position:fixed;
      top:0; right:0; bottom:0;
      width:var(--chatW);
      max-width:100vw;
      background:var(--panel);
      border-left:1.5px solid var(--rule-strong);
      box-shadow:-30px 0 60px rgba(0,0,0,0.45);
      transform:translateX(100%);
      transition:transform 280ms cubic-bezier(0.2,0.8,0.2,1);
      z-index:80;
      display:flex;
      flex-direction:column;
      min-height:0;
    }
    .chat-sidebar.show{ transform:translateX(0); box-shadow:-10px 0 24px rgba(0,0,0,0.18); }
    .chat-sidebar::before{
      content:"";
      position:absolute;
      left:0; top:0; bottom:0;
      width:4px;
      background:var(--accent-zh);
      z-index:1;
    }
    .chat-resize-handle{
      position:absolute;
      left:-8px;
      top:0;
      bottom:0;
      width:14px;
      padding:0;
      border:0;
      background:transparent;

    .chat-msg.assistant h2,
    .chat-msg.assistant h3{

      font-weight:600;
      line-height:1.35;
    }
    .chat-msg.assistant h1{ font-size:20px; }
    .chat-msg.assistant h2{ font-size:18px; }
    .chat-msg.assistant h3{ font-size:16.5px; }
    .chat-msg.assistant p{
      margin:0 0 0.55em;
      white-space:normal;
    }
    .chat-msg.assistant ul,
    .chat-msg.assistant ol{
      margin:0.25em 0 0.65em 1.35em;
      padding:0;
      white-space:normal;
    }
    .chat-msg.assistant li{ margin:0.16em 0; }
    .chat-msg.assistant blockquote{
      margin:0.45em 0 0.65em;
      padding:0.2em 0 0.2em 0.8em;
      border-left:3px solid var(--accent-zh);
      color:var(--muted);
      white-space:normal;
    }
    .chat-msg.assistant code{
      font-family:var(--font-mono);
      font-size:13.5px;
      background:var(--bg);
      border:1px solid var(--rule-soft);
      border-radius:4px;
      padding:1px 4px;
    }
    .chat-msg.assistant pre{
      margin:0.45em 0 0.65em;
      padding:9px 10px;
      overflow:auto;
      background:var(--bg);
      border:1px solid var(--rule-soft);
      border-radius:6px;
      white-space:pre;
    }
    .chat-msg.assistant pre code{
      display:block;
      padding:0;
      background:transparent;
      border:0;
      white-space:pre;

    .chat-msg.assistant a{

    }
    .chat-msg.assistant.streaming::after{
      content:"▌";

      color:var(--accent-zh);
      animation:caret-blink 1s steps(2) infinite;
      margin-left:1px;
    }
    @keyframes caret-blink{
      0%,100%{ opacity:1; }
      50%{ opacity:0; }

    .chat-input-row{
      flex-shrink:0;
      display:flex;
      align-items:flex-end;
      gap:6px;
      padding:10px 14px 14px;
      border-top:1px solid var(--rule-soft);
      background:var(--panel-2);
    }
    .chat-input-row textarea{
      flex:1;
      min-height:38px;
      max-height:140px;
      padding:10px 12px;

      color:var(--text);
      font-family:var(--font-body);
      font-size:13.5px;
      line-height:1.5;
      outline:none;

    }
    .chat-input-row textarea:focus{
      border-color:var(--accent-zh);
      box-shadow:0 0 0 3px var(--accent-zh-bg);
    }
    .chat-input-row .icon{ flex-shrink:0; }

    .chat-scrim{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.30);
      backdrop-filter:blur(2px);
      -webkit-backdrop-filter:blur(2px);
      z-index:75;
      opacity:0;
      pointer-events:none;
      transition:opacity 240ms ease;
    }
    .chat-scrim.show{ opacity:1; pointer-events:auto; }
    body.chat-open .chat-scrim.show{
      opacity:0;
      pointer-events:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }
    [data-theme="light"] .chat-scrim{ background:rgba(40,30,20,0.18); }
    body.chat-open #toastHost{ right:calc(20px + var(--chatW)); }
    body.chat-open .stop-fab{ right:calc(24px + var(--chatW)); }

    .selection-tooltip{
      --askAccent:var(--accent-src);
      --askLine:var(--accent-src-line);
      --askGlow:var(--accent-src-glow);
      position:fixed;
      z-index:95;
      display:none;
      align-items:center;
      justify-content:center;
      max-width:min(180px, calc(100vw - 24px));
      padding:0;
      border:0;
      background:transparent;
    }
    .selection-tooltip[data-source="out1"][data-lang="zh-TW"]{
      --askAccent:var(--accent-zh);
      --askLine:var(--accent-zh-line);
      --askGlow:var(--accent-zh-glow);
    }
    .selection-tooltip[data-source="out1"][data-lang="ja"]{
      --askAccent:var(--accent-ja);
      --askLine:var(--accent-ja-line);
      --askGlow:var(--accent-ja-glow);
    }
    .selection-tooltip.show{
      display:flex;
      animation:ask-pop 150ms ease-out both;
    }
    .selection-tooltip::after{
      content:"";
      position:absolute;
      left:var(--arrow-left,50%);
      width:10px;
      height:10px;
      background:var(--panel);
      border:1.5px solid var(--askAccent);
      transform:translateX(-50%) rotate(45deg);
      z-index:0;
    }
    .selection-tooltip[data-placement="below"]::after{
      top:-4px;
      border-right:0;
      border-bottom:0;
    }
    .selection-tooltip[data-placement="above"]::after{
      bottom:-4px;
      border-left:0;
      border-top:0;
    }
    @keyframes ask-pop{
      from{ opacity:0; transform:translateY(3px) scale(0.96); }
      to{ opacity:1; transform:translateY(0) scale(1); }
    }
    .selection-label{
      position:absolute;
      width:1px;
      height:1px;
      overflow:hidden;
      clip:rect(0 0 0 0);
      clip-path:inset(50%);
      white-space:nowrap;
    }
    .selection-ask{
      position:relative;
      z-index:1;
      min-height:34px;
      padding:7px 14px 8px;
      border:1.5px solid var(--askAccent);
      border-radius:999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.02)),
        var(--panel);
      color:var(--text);
      box-shadow:
        0 6px 14px rgba(0,0,0,0.32),
        0 0 0 2.5px var(--askGlow),
        inset 0 0 0 1px rgba(255,255,255,0.08);
      font-family:var(--font-body);
      font-weight:700;
      font-size:13px;
      letter-spacing:0;
      cursor:pointer;
      white-space:nowrap;
    }
    .selection-ask:hover{
      border-color:var(--askAccent);
      transform:translateY(-1px);
    }
    .selection-ask:focus-visible{
      outline:2px solid var(--askAccent);
      outline-offset:3px;
    }
    [data-theme="light"] .selection-ask{
      box-shadow:
        0 4px 10px rgba(40,30,20,0.18),
        0 0 0 2px var(--askGlow),
        inset 0 0 0 1px rgba(255,255,255,0.26);
    }

    @media (max-width:720px){
      .chat-sidebar{ width:100vw; }
      .chat-resize-handle{ display:none; }
      body.chat-open .wrap{ width:100%; margin:0 auto; transform:none; }
      body.chat-open #toastHost{ right:50%; }
      body.chat-open .stop-fab{ right:24px; }
    }
  </style>
</head>

  function renderInlineMarkdown(text){
    let out=String(text??'');
    out=out.replace(/`([^`\n]+)`/g,'<code>$1</code>');

    out=out.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+|mailto:[^\s)]+)\)/g,(_m,label,href)=>{const i=links.length;links.push(`<a href="${escapeAttr(href)}" target="_blank" rel="noopener noreferrer">${label}</a>`);return `\u0000BI_LINK_${i}\u0000`});

  function renderMarkdownLite(input){
    let text=String(input??'').replace(/\r\n?/g,'\n');
    const codeBlocks=[];
    text=text.replace(/```([A-Za-z0-9_-]*)[ \t]*\n([\s\S]*?)```/g,(_m,lang,code)=>{const i=codeBlocks.length;codeBlocks.push({lang,code:code.replace(/\n$/,'')});return `\u0000BI_CODE_${i}\u0000`});

    let i=0;
    while(i<lines.length){
      const trimmed=lines[i].trim();
      if(!trimmed){i++;continue}
      if(/^\u0000BI_CODE_\d+\u0000$/.test(trimmed)){blocks.push(restoreCode(trimmed));i++;continue}
      if(/^---+$/.test(trimmed)){blocks.push('<hr>');i++;continue}
      const heading=trimmed.match(/^(#{1,3})\s+(.+)$/);
      if(heading){const level=heading[1].length;blocks.push(`<h${level}>${renderInlineMarkdown(heading[2])}</h${level}>`);i++;continue}

      if(/^[-*]\s+/.test(trimmed)){const items=[];while(i<lines.length&&/^[-*]\s+/.test(lines[i].trim())){items.push(lines[i].trim().replace(/^[-*]\s+/,''));i++}blocks.push(`<ul>${items.map(x=>`<li>${renderInlineMarkdown(x)}</li>`).join('')}</ul>`);continue}
      if(/^\d+\.\s+/.test(trimmed)){const items=[];while(i<lines.length&&/^\d+\.\s+/.test(lines[i].trim())){items.push(lines[i].trim().replace(/^\d+\.\s+/,''));i++}blocks.push(`<ol>${items.map(x=>`<li>${renderInlineMarkdown(x)}</li>`).join('')}</ol>`);continue}
      const para=[];
      while(i<lines.length){const current=lines[i].trim();if(!current||/^(#{1,3})\s+/.test(current)||/^[-*]\s+/.test(current)||/^\d+\.\s+/.test(current)||/^&gt;\s?/.test(current)||/^---+$/.test(current)||/^\u0000BI_CODE_\d+\u0000$/.test(current))break;para.push(lines[i]);i++}
      blocks.push(`<p>${restoreCode(para.map(renderInlineMarkdown).join('<br>'))}</p>`)
    }
    return blocks.join('')
  }

    await check('finishRefineRun no-ops when another controller active',()=>{const c1=new AbortController(),c2=new AbortController();state.refineController=c2;state.refineKind='auto';$('btnRefine1').classList.add('refining');finishRefineRun(c1);const preserved=state.refineController===c2&&state.refineKind==='auto'&&$('btnRefine1').classList.contains('refining');state.refineController=null;state.refineKind=null;$('btnRefine1').classList.remove('refining');updateConsumers();return preserved});
    await check('auto refine setting stays out of real storage during tests',()=>{const before=localStorage.getItem(KEYS.AUTO_REFINE);const prev=state.autoRefine;state.autoRefine=!prev;const after=localStorage.getItem(KEYS.AUTO_REFINE);state.autoRefine=prev;return before===after});
    mock.queue.push(chatResponse('件名：手動改善\n\n手動潤稿本文','stop'));
    await check('manual refine still works when autoRefine off',async()=>{setupMailDraft();state.autoRefine=false;await runRefine({auto:false});state.autoRefine=true;return state.result?.subject==='手動改善'&&state.result?.body==='手動潤稿本文'&&!!state.diff});
    await check('trigger: ja→zh forward does not auto refine (1 call)',async()=>{const so=state.langOverride,ss=el.src.value;state.mode='mail';state.langOverride='ja';el.src.value='会議の資料を確認';state.autoRefine=true;mock.queue.push(sseResponse([{content:'請確認會議資料。',finish:'stop'}]));const before=state.network.wrappedCalls;await submitTranslation('selftest');await settle();const calls=state.network.wrappedCalls-before;state.langOverride=so;el.src.value=ss;return calls===1&&state.refineKind===null});
    await check('trigger: zh→ja forward auto refines (2 calls)',async()=>{const so=state.langOverride,ss=el.src.value;state.mode='mail';state.langOverride='zh-TW';el.src.value='幫我寫信確認會議時間';state.autoRefine=true;mock.queue.push(sseResponse([{content:'件名：会議日程のご確認\n\n会議の時間を確認したく存じます。',finish:'stop'}]));mock.queue.push(chatResponse('件名：会議日程のご確認\n\n会議のお時間を確認させていただきたく存じます。','stop'));const before=state.network.wrappedCalls;await submitTranslation('selftest');await settle();const calls=state.network.wrappedCalls-before;state.langOverride=so;el.src.value=ss;return calls===2&&state.result?.subject==='会議日程のご確認'});
    await check('run-level race: c1 late response after c2 active does not clobber c2',async()=>{setupMailDraft({subject:'初稿一',body:'本文一',raw:'件名：初稿一\n\n本文一'});let rel1;state.transport=()=>new Promise(r=>{rel1=()=>r(chatResponse('件名：遲到一\n\n遲到本文一','stop'))});const p1=runRefine({auto:true});await settle();const c1=state.refineController;abortController('refineController');state.refineKind=null;setupMailDraft({subject:'初稿二',body:'本文二',raw:'件名：初稿二\n\n本文二'});let rel2;state.transport=()=>new Promise(r=>{rel2=()=>r(chatResponse('件名：改善二\n\n改善本文二','stop'))});const p2=runRefine({auto:true});await settle();const c2=state.refineController;rel1();await settle();const c2Intact=state.refineController===c2&&state.refineKind==='auto'&&$('btnRefine1').classList.contains('refining');rel2();await p2;await p1;await settle();return c1!==c2&&c2Intact&&state.result?.subject==='改善二'});
    await check('settings toggle OFF aborts in-flight auto refine (real onchange)',async()=>{const draft=setupMailDraft();let rel;state.transport=()=>new Promise(r=>{rel=()=>r(chatResponse('件名：改善\n\n改善本文','stop'))});const p=runRefine({auto:true});await settle();const wasAuto=state.refineKind==='auto';el.autoRefine.checked=false;el.autoRefine.dispatchEvent(new Event('change'));const aborted=state.refineKind===null&&state.refineController===null;rel();await p;await settle();const kept=state.result===draft&&state.result.subject==='ご確認';el.autoRefine.checked=true;state.autoRefine=true;return wasAuto&&aborted&&kept});
    await check('auto refine: throwing transport keeps draft',async()=>{const draft=setupMailDraft();const savedT=state.transport;state.transport=async()=>{throw new Error('network boom')};await runRefine({auto:true});const kept=state.result===draft&&state.result.subject==='ご確認'&&state.refineKind===null&&state.refineController===null;state.transport=savedT;return kept});
    await check('new submit (invalidateAll) aborts in-flight auto refine',async()=>{setupMailDraft();let rel;state.transport=()=>new Promise(r=>{rel=()=>r(chatResponse('件名：改善\n\n改善本文','stop'))});const p=runRefine({auto:true});await settle();invalidateAll({clearResult:true});const cleared=state.refineKind===null&&state.refineController===null&&state.result===null;rel();await p;await settle();return cleared&&state.result===null});
    await check('manual refine button disabled during auto refine',()=>{setupMailDraft();state.refineKind='auto';updateConsumers();const dis=$('btnRefine1').disabled;state.refineKind=null;updateConsumers();return dis});
    await check('auto refine locks speak/subject/full/out1 editing',()=>{setupMailDraft();state.refineKind='auto';renderResult();const locked=$('btnSpeak1').disabled&&$('btnCopySubject').disabled&&$('btnCopyFull').disabled&&el.out1.contentEditable==='false';state.refineKind=null;renderResult();return locked});
    await check('output selection ask-AI disabled during auto refine',()=>{setupMailDraft();state.selection={owner:'output',text:'x'};state.refineKind='auto';updateConsumers();const dis=$('btnAskSelectionAI').disabled;state.selection=null;state.refineKind=null;updateConsumers();return dis});
    await check('auto refine commit stops speaking (ttsGen invalidated)',async()=>{const draft=setupMailDraft();const savedT=state.transport;state.transport=async()=>chatResponse('件名：改善\n\n改善本文','stop');state.speaking=true;const g=state.ttsGen;await runRefine({auto:true});const ok=state.speaking===false&&state.ttsGen>g&&state.result?.subject==='改善';state.transport=savedT;return ok});
    state.result=null;state.refineKind=null;state.diff=null;el.src.value='';state.speaking=false;renderAll();
    await check('hermetic wrapper made requests',()=>state.network.wrappedCalls>0);await check('zero real network requests',()=>state.network.realCalls===0);
    const failed=results.filter(x=>!x.ok);window.__BI_HERMETIC_TESTS__=results;el.selftestBadge.className=`selftest-badge show ${failed.length?'fail':'pass'}`;el.selftestBadge.textContent=failed.length?`SELFTEST FAIL ${failed.length}/${results.length}`:`SELFTEST PASS ${results.length}/${results.length} · REAL NETWORK 0`;console.group(`雙語書房 hermetic self-tests: ${results.length-failed.length}/${results.length}`);console.table(results);console.groupEnd();return{total:results.length,failed,realNetwork:state.network.realCalls}}
  function loadJson(key,fallback){try{const v=JSON.parse(localStorage.getItem(key)||'');return v??fallback}catch{return fallback}}
  function boot(){
    MODELS.forEach(m=>{const o=document.createElement('option');o.value=m;o.textContent=m;el.model.appendChild(o)});for(const[k,v]of Object.entries(SCENES)){const o=document.createElement('option');o.value=k;o.textContent=v[0];el.sceneSelect.appendChild(o)}for(const[k,v]of Object.entries(AUDIENCES)){const o=document.createElement('option');o.value=k;o.textContent=v[0];el.audienceSelect.appendChild(o)}
    state.glossary=Array.isArray(loadJson(KEYS.GLOSSARY,[]))?loadJson(KEYS.GLOSSARY,[]):[];state.chat=Array.isArray(loadJson(KEYS.CHAT,[]))?loadJson(KEYS.CHAT,[]):[];el.apiKey.value=isSelftest?'':state.apiKey;el.ttsKey.value=isSelftest?'':state.ttsKey;el.model.value=state.model;el.langOverride.value=state.langOverride;el.sceneSelect.value=state.scene;el.audienceSelect.value=state.audience;el.autoSpeak.checked=state.autoSpeak;el.autoRefine.checked=state.autoRefine;
    if(!isSelftest)el.src.value=localStorage.getItem(KEYS.SRC)||'';warmVoiceCatalog();applyTheme(state.theme);setGridSplit(state.grid);bindEvents();renderAll();renderChat();const light=runLightTests();if(light.failed.length){el.selftestBadge.className='selftest-badge show fail';el.selftestBadge.textContent=`LIGHT TEST FAIL ${light.failed.length}`}
    if(isSelftest)runHermeticTests().catch(e=>{console.error(e);el.selftestBadge.className='selftest-badge show fail';el.selftestBadge.textContent='SELFTEST CRASH'});
    window.__BI_TEST_API__={detectLang,parseMailResult,serializeMailResult,findPlaceholders,buildSystemPrompt,classifyCompletion,canCommitPending,canUseResult,normalizeVoiceLocale,selectLocalVoice,waitForVoiceCatalog,computeSelectionTooltipPosition,positionSelectionTooltip,showSelection,hideSelection,runLightTests,runHermeticTests,state};
  }
  boot();
